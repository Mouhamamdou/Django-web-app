{% load static %}
<html>
    <head>
        <title>LITReview</title>
        <link rel="stylesheet" href="{% static 'app.css' %}">
    </head>
    <body>
        <h1>LITReview</h1>
        {% block content %}{% endblock content %}
        {% if user.is_authenticated %}
            <div class="sidebar">
                <p>Vous êtes connecté en tant que {{ request.user }}.</p>

                <form method="get" action="{% url 'home' %}">
                    {% csrf_token %}
                    <button type="submit" >Accueil</button>
                 </form>

                 <form method="post" action="{% url 'follow-users' %}">
                    {% csrf_token %}
                    <button type="submit" >Suivre d'autres utilisateurs</button>
                 </form>

                 <form method="post" action="{% url 'ticket-create' %}">
                    {% csrf_token %}
                    <button type="submit" >Demander une critique</button>
                 </form>

                 <form method="post" action="{% url 'review-create' %}">
                    {% csrf_token %}
                    <button type="submit" >Créer une critique</button>
                 </form>

                <form method="post" action="{% url 'create-ticket-review' %}">
                    {% csrf_token %}
                    <button type="submit" >Créer un ticket et une critique</button>
                </form>

                 <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" >Se déconnecter</button>
                </form>
            </div>
        {% endif %}
    </body>
</html>
